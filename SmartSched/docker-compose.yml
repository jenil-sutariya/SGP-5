services:
  postgres:
    image: postgres:16-alpine
    container_name: smartsched-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartsched
      POSTGRES_PASSWORD: smartsched_secret
      POSTGRES_DB: smartsched
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsched -d smartsched"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartsched-api
    restart: unless-stopped
    env_file:
      - ./backend/.env.development
    environment:
      DATABASE_URL: postgresql://smartsched:smartsched_secret@postgres:5432/smartsched?schema=public
      NODE_ENV: production
      FRONTEND_URL: http://localhost
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: smartsched-web
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: smartsched-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  backend_logs:
